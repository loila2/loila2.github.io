<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bhupendra | Game Developer</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#020617;
  color:white;
}

/* HERO */
.hero {
  padding:60px 20px;
  text-align:center;
  background:linear-gradient(135deg,#020617,#0f172a);
}

.hero h1 {
  font-size:42px;
  color:#38bdf8;
}

.hero p {
  color:#94a3b8;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  width:90%;
  margin:auto;
  padding:40px 0;
}

/* CARD */
.card {
  background:#0f172a;
  border-radius:16px;
  overflow:hidden;
  transition:0.3s;
  cursor:pointer;
}

.card:hover {
  transform:translateY(-10px);
  box-shadow:0 0 25px rgba(56,189,248,0.5);
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content {
  padding:15px;
}

.card h3 {
  color:#facc15;
}

.tag {
  display:inline-block;
  background:#1e293b;
  padding:4px 10px;
  border-radius:6px;
  font-size:12px;
  margin-top:8px;
}

/* FEATURED */
.featured {
  width:90%;
  margin:40px auto;
  background:#0f172a;
  border-radius:16px;
  padding:20px;
}

.featured iframe {
  width:100%;
  height:420px;
  border-radius:10px;
}

/* BUTTON */
.btn {
  display:inline-block;
  margin-top:10px;
  padding:8px 15px;
  background:#38bdf8;
  color:black;
  border-radius:8px;
}

/* POPUP */
#popup {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

#popup iframe {
  width:80%;
  height:450px;
}

.close {
  margin-top:10px;
  cursor:pointer;
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Bhupendra Kumar</h1>
  <p>Unity Game Developer | Multiplayer | Physics | Hyper Casual </p>
</div>

<!-- FEATURED -->
<div class="featured">
  <h2>🚀 Featured: Carrom Multiplayer</h2>
  <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe>
  <p>Real-time multiplayer with Socket.IO and physics system</p>
</div>

<!-- GAME GRID -->
<div class="grid" id="games"></div>

<!-- POPUP -->
<div id="popup" onclick="closeVideo()">
  <div>
    <iframe id="videoFrame"></iframe>
    <div class="btn close">Close</div>
  </div>
</div>

<footer>
  Email: your@email.com
</footer>

<script>
const games = [
  {name:"Carrom",img:"images/carrom.jpg",video:"YOUR_VIDEO_ID",tag:"Multiplayer"},
  {name:"Ludo",img:"images/ludo.jpg",video:"",tag:"Board"},
  {name:"Cricket Skills",img:"images/cricket.jpg",video:"",tag:"Sports"},
  {name:"Business Monopoly",img:"images/monopoly.jpg",link:"https://play.google.com/store/apps/details?id=real11.game.business",tag:"Strategy"},
  {name:"Fighting Game",img:"images/fighting.jpg",video:"",tag:"Action"},
  {name:"Running Game",img:"images/running.jpg",video:"",tag:"Arcade"},
  {name:"2048",img:"images/2048.jpg",video:"",tag:"Puzzle"},
  {name:"2048 3D",img:"images/2048-3d.jpg",video:"",tag:"Puzzle"},
  {name:"Adventure Run",img:"images/adventure.jpg",video:"",tag:"Adventure"},
  {name:"Zola in Unfair World",img:"images/zola.jpg",video:"",tag:"Adventure"},
  {name:"Bubble Shooter",img:"images/bubble.jpg",video:"",tag:"Casual"}
];

const container = document.getElementById("games");

games.forEach(g=>{
  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <img src="${g.img}">
    <div class="card-content">
      <h3>${g.name}</h3>
      <span class="tag">${g.tag}</span>
    </div>
  `;

  div.onclick=()=>{
    if(g.video){
      openVideo(g.video);
    } else if(g.link){
      window.open(g.link,"_blank");
    }
  };

  container.appendChild(div);
});

function openVideo(id){
  document.getElementById("popup").style.display="flex";
  document.getElementById("videoFrame").src="https://www.youtube.com/embed/"+id;
}

function closeVideo(){
  document.getElementById("popup").style.display="none";
  document.getElementById("videoFrame").src="";
}
</script>

</body>
</html>
