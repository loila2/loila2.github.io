<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bhupendra | Game Developer</title>

<style>
body {margin:0;font-family:Arial;background:#020617;color:white}

/* HERO */
.hero {
  padding:80px 20px;
  text-align:center;
  background:linear-gradient(135deg,#020617,#0f172a);
}
.hero h1 {font-size:42px;color:#38bdf8}
.hero p {color:#94a3b8;margin-top:10px}
.hero .tags span {
  background:#1e293b;
  padding:6px 12px;
  border-radius:8px;
  margin:5px;
  display:inline-block;
}
.btn {
  display:inline-block;
  margin-top:20px;
  padding:10px 20px;
  background:#38bdf8;
  color:black;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

/* FEATURED */
.featured {
  width:90%;
  margin:40px auto;
  background:#0f172a;
  border-radius:16px;
  padding:20px;
  text-align:center;
}
.featured iframe {
  width:100%;
  height:400px;
  border-radius:10px;
}

/* FILTER */
.filter {text-align:center}
.filter button {
  margin:5px;
  padding:8px 15px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  cursor:pointer;
}
.filter button.active {background:#38bdf8;color:black}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  width:90%;
  margin:auto;
  padding:40px 0;
}

/* CARD */
.card {
  background:#0f172a;
  border-radius:16px;
  overflow:hidden;
  transition:0.3s;
  cursor:pointer;
}
.card:hover {
  transform:translateY(-8px);
  box-shadow:0 0 20px rgba(56,189,248,0.5);
}
.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}
.card-content {padding:15px}
.card h3 {color:#facc15}
.card p {font-size:13px;color:#cbd5f5;margin-top:8px}
.tag {
  background:#1e293b;
  padding:4px 10px;
  border-radius:6px;
  font-size:12px;
  display:inline-block;
  margin-top:8px;
}

/* POPUP */
#popup {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}
#popup iframe {width:80%;height:450px}
.close {margin-top:10px}

/* FOOTER */
footer {text-align:center;padding:30px;color:#94a3b8}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Bhupendra Kumar</h1>
  <p>Unity Game Developer | Multiplayer | Physics | Hyper Casual</p>

  <div class="tags">
    <span>🎮 10+ Games</span>
    <span>🌐 Multiplayer Systems</span>
    <span>⚡ Physics Based Gameplay</span>
  </div>

  <a href="#games" class="btn">View My Games</a>
</div>

<!-- FEATURED -->
<div class="featured">
  <h2>🚀 Carrom Multiplayer Showcase</h2>
  <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe>
  <p>Real-time multiplayer carrom game with synchronized physics and turn-based gameplay.</p>
</div>

<!-- FILTER -->
<div class="filter">
  <button onclick="filterGames('All')" class="active">All</button>
  <button onclick="filterGames('Multiplayer')">Multiplayer</button>
  <button onclick="filterGames('Action')">Action</button>
  <button onclick="filterGames('Puzzle')">Puzzle</button>
</div>

<!-- GRID -->
<div class="grid" id="games"></div>

<!-- POPUP -->
<div id="popup" onclick="closeVideo()">
  <div>
    <iframe id="videoFrame"></iframe>
    <br>
    <button class="btn close">Close</button>
  </div>
</div>

<footer>Email: your@email.com</footer>

<script>
const games = [
{name:"Carrom Multiplayer",img:"images/carrom.jpg",video:"YOUR_VIDEO_ID",tag:"Multiplayer",
desc:"Real-time multiplayer carrom game with physics sync and turn system."},

{name:"Ludo",img:"images/ludo.jpg",tag:"Board",
desc:"Classic turn-based Ludo game with smooth movement system."},

{name:"Cricket Skills",img:"images/cricket.jpg",tag:"Sports",
desc:"Skill-based cricket gameplay with timing and control."},

{name:"Business Monopoly",img:"images/monopoly.jpg",
link:"https://play.google.com/store/apps/details?id=real11.game.business",
tag:"Strategy",
desc:"Property trading and strategy-based Monopoly-style game."},

{name:"Fighting Game",img:"images/fighting.jpg",tag:"Action",
desc:"Multiplayer combat game with real-time fighting mechanics."},

{name:"Running Game",img:"images/running.jpg",tag:"Action",
desc:"Endless runner with obstacles and increasing speed."},

{name:"2048",img:"images/2048.jpg",tag:"Puzzle",
desc:"Classic tile merging puzzle gameplay."},

{name:"2048 3D",img:"images/2048-3d.jpg",tag:"Puzzle",
desc:"3D version of 2048 with enhanced visuals."},

{name:"Adventure Run",img:"images/adventure.jpg",tag:"Adventure",
desc:"Exploration-based runner with environment challenges."},

{name:"Zola Unfair World",img:"images/zola.jpg",tag:"Adventure",
desc:"Hardcore platformer with traps and high difficulty."},

{name:"Bubble Shooter",img:"images/bubble.jpg",tag:"Puzzle",
desc:"Casual bubble shooting gameplay with levels."}
];

let currentFilter="All";

function renderGames(){
  const container=document.getElementById("games");
  container.innerHTML="";

  games.filter(g=>currentFilter==="All"||g.tag===currentFilter)
  .forEach(g=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${g.img}">
      <div class="card-content">
        <h3>${g.name}</h3>
        <p>${g.desc}</p>
        <span class="tag">${g.tag}</span>
      </div>
    `;

    div.onclick=()=>{
      if(g.video) openVideo(g.video);
      else if(g.link) window.open(g.link,"_blank");
    };

    container.appendChild(div);
  });
}

function filterGames(type){
  currentFilter=type;
  document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  renderGames();
}

function openVideo(id){
  document.getElementById("popup").style.display="flex";
  document.getElementById("videoFrame").src="https://www.youtube.com/embed/"+id;
}

function closeVideo(){
  document.getElementById("popup").style.display="none";
  document.getElementById("videoFrame").src="";
}

renderGames();
</script>

</body>
</html>
